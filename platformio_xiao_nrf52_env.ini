[env:Xiao_nrf52_drone_scanner]
extends = Xiao_nrf52
lib_ldf_mode = chain+
lib_ignore = AIS_NB_BC95
board_build.ldscript = boards/nrf52840_s140_v7_extrafs.ld
board_upload.maximum_size = 708608
build_flags =
  ${Xiao_nrf52.build_flags}
  -D ADVERT_NAME='"DroneScanner"'
  -D SCAN_CHANNEL_NAME='"Public"'
  -D SCAN_CHANNEL_PSK='"izOH6cXN6mrJ5e26oRXNcg=="'
  -D SCAN_INTERVAL_MS=60000UL
  -D SCAN_COLLECT_MS=10000UL
  -D MAX_CONTACTS=50
  -D MAX_GROUP_CHANNELS=4
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D LORA_CR=8
  -D QSPIFLASH=1
build_src_filter = ${Xiao_nrf52.build_src_filter}
  +<../examples/drone_scanner>
lib_deps =
  ${Xiao_nrf52.lib_deps}
  densaugeo/base64 @ ~1.4.0
  -D LORA_CR=8
