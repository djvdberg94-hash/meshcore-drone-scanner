[env:Heltec_WSL3_drone_scanner]
extends = Heltec_lora32_v3
build_flags =
  ${Heltec_lora32_v3.build_flags}
  -D ADVERT_NAME='"DroneScanner"'
  -D SCAN_CHANNEL_NAME='"Public"'
  -D SCAN_CHANNEL_PSK='"izOH6cXN6mrJ5e26oRXNcg=="'
  -D LORA_CR=8
  -D SCAN_INTERVAL_MS=90000UL
  -D SCAN_COLLECT_MS=10000UL
  -D MAX_CONTACTS=50
  -D MAX_GROUP_CHANNELS=4
  -D DISPLAY_CLASS=SSD1306Display
build_src_filter =
  +<*.cpp>
  +<helpers/*.cpp>
  +<helpers/radiolib/*.cpp>
  +<helpers/bridges/BridgeBase.cpp>
  +<../variants/heltec_v3>
  +<helpers/sensors>
  +<helpers/ui/SSD1306Display.cpp>
